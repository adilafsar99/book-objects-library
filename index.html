<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="style.css" />
		<script
			src="https://kit.fontawesome.com/5b053b265f.js"
			crossorigin="anonymous"
		></script>
		<script src="script.js" defer></script>
		<title>Library App</title>
	</head>
	<body>
		<header class="header">
			<h1 id="page-heading">Library</h1>
			<div>
				<button id="add-button">Add book</button>
				<span id="add-sign"> + </span>
			</div>
		</header>
		<main class="book-list">
			<div class="book">
				<div class="info-section">
					<p class="title">No Longer Human</p>
					<p class="author">Osamu Dazai</p>
                    <p class="pages">177</p>
					<p class="status">Not Read</p>
				</div>
				<div class="button-section">
					<button class="toggle-button"><span class="fa-regular fa-circle-check"></span></button>
					<button class="edit-button"><span class="fa-regular fa-pen-to-square"></span></button>
					<button class="delete-button"><span class="fa-regular fa-trash-can"></span></button>
				</div>
			</div>

            <!--The modal that takes user input for the book entry-->
			<dialog id="add-book-modal">
				<form id="add-book-form">
					<div class="form-row">
						<label for="title">Title</label>
						<input class="form-input" id="title" type="text" name="title" autofocus required/>
					</div>
					<div class="form-row">
						<label for="title">Author</label>
						<input class="form-input" id="author" type="text" name="author" required/>
					</div>
					<div class="form-row">
						<label for="pages">Pages</label>
						<input class="form-input" id="pages" type="number" name="pages" min="100" required/>
					</div>
					<div class="form-row">
						<label id="checkbox-label" for="read-status-checkbox"
							>Have you read the book?
							<input
								type="checkbox"
								name="read-status-checkbox"
								id="read-status-checkbox"
                                class="form-input"
							/>
						</label>
					</div>
					<button id="modal-button">Add</button>
				</form>
			</dialog>
            
            <!-- The dialog box that pops ip to confirm user's choice -->
            <dialog id="confirm-choice-modal">
              <div class="dialog-message">
                  <p>Are you sure?</p>
              </div>
              <div class="dialog-buttons">
                   <button id="confirm-dialog-button"><span class="fa-solid fa-check"></span></button>
                   <button id="cancel-dialog-button"><span class="fa-solid fa-x"></span></button>
              </div>
            </dialog>

		</main>
	</body>
</html>
